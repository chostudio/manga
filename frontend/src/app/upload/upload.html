<main class="flex items-center justify-center flex-1 px-4">
  <div class="w-full max-w-xl">
    <h1 class="text-3xl font-bold tracking-wide text-zinc-100 mb-6">Upload Manga Page</h1>
    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="url" class="block text-base font-semibold tracking-wide text-zinc-300 mb-1">Page URL</label>
        <input
          id="url"
          type="url"
          [(ngModel)]="url"
          name="url"
          required
          placeholder="https://example.com/manga/chapter-1"
          class="w-full px-5 py-4 text-base rounded-2xl border border-zinc-700 bg-zinc-800 text-zinc-100 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder:text-zinc-500"
        />
      </div>
      <button
        type="submit"
        [disabled]="submitting || !url"
        class="w-full py-3 px-6 rounded-2xl bg-blue-600 text-white font-medium text-base hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        {{ submitting ? 'Uploading…' : 'Upload' }}
      </button>
      @if (message) {
        <p class="text-sm" [class.text-green-600]="!error" [class.text-red-600]="error">{{ message }}</p>
      }
    </form>
  </div>
</main>
